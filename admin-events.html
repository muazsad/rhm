<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHM Admin — Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #2db84b;
      --black: #0a0a0a;
      --white: #f2f2ee;
      --muted: #888;
      --surface: #111;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    .admin-nav {
      background: var(--surface);
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 64px;
    }
    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .nav-left a { display: flex; align-items: center; }
    .nav-left img { height: 36px; width: auto; }
    .nav-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted);
      border-left: 1px solid #2a2a2a; padding-left: 1rem;
    }
    .nav-right a {
      font-size: 12px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
    }
    .nav-right a:hover { color: var(--green); }

    /* ── MAIN ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3.5rem 2rem;
    }

    .page-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--green); margin-bottom: 0.5rem;
    }
    .page-headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem; letter-spacing: 0.06em;
      color: var(--white); margin-bottom: 2.5rem; line-height: 1;
    }

    /* ── TWO COLUMNS ── */
    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* ── FORM ── */
    .form-panel {
      background: var(--surface);
      border: 1px solid #1e1e1e;
      padding: 2rem;
    }

    .panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 0.08em;
      color: var(--white); margin-bottom: 1.5rem;
    }

    .form { display: flex; flex-direction: column; gap: 1rem; }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }

    .field label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
    }

    .field input,
    .field select,
    .field textarea {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 0.7rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .field input::placeholder,
    .field textarea::placeholder { color: #444; }

    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--green); }

    .field select {
      appearance: none;
      cursor: pointer;
    }

    .field textarea { resize: vertical; min-height: 88px; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .check-row {
      flex-direction: row;
      align-items: center;
      gap: 0.65rem;
      color: var(--white);
      font-size: 13px;
    }
    .check-row input { width: auto; accent-color: var(--green); }
    .builder-panel {
      border: 1px solid #242424;
      background: #0b0b0b;
      padding: 1rem;
      display: none;
      flex-direction: column;
      gap: 0.85rem;
    }
    .builder-panel.active { display: flex; }
    .builder-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .builder-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green);
    }
    .btn-small {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: var(--white);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      padding: 0.45rem 0.65rem;
      cursor: pointer;
    }
    .btn-small:hover { border-color: var(--green); color: var(--green); }
    .question-card {
      border: 1px solid #222;
      background: #111;
      padding: 0.85rem;
      display: grid;
      gap: 0.75rem;
    }
    .question-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
    }
    .question-actions label {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--muted);
      font-size: 12px;
    }
    .question-actions input { width: auto; accent-color: var(--green); }
    .btn-remove {
      background: transparent;
      border: none;
      color: #e05555;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-post {
      margin-top: 0.25rem;
      width: 100%;
      background: var(--green);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem; letter-spacing: 0.12em;
      border: none; padding: 0.8rem 1rem;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-post:hover { background: #27a343; }

    /* ── EVENT LIST ── */
    .list-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.25rem;
    }

    .list-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 0.08em; color: var(--white);
    }

    .event-count {
      font-size: 12px; font-weight: 500; color: var(--muted);
      letter-spacing: 0.08em;
    }

    .event-card {
      background: var(--surface);
      border: 1px solid #1e1e1e;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color 0.2s;
    }
    .event-card:hover { border-color: #2a2a2a; }

    .event-info { flex: 1; }

    .event-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem; letter-spacing: 0.06em;
      color: var(--white); margin-bottom: 0.3rem;
    }

    .event-meta {
      font-size: 12px; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .event-meta span { display: flex; align-items: center; gap: 0.3rem; }

    .badge {
      display: inline-block;
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.2rem 0.55rem;
    }

    .badge-open { background: rgba(45,184,75,0.15); color: var(--green); }
    .badge-closed { background: rgba(255,255,255,0.06); color: var(--muted); }
    .badge-soon { background: rgba(255,190,0,0.12); color: #fbbe00; }

    .event-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .registrations-panel {
      margin-top: 2rem;
      background: var(--surface);
      border: 1px solid #1e1e1e;
      padding: 1.5rem;
    }
    .registrations-list {
      display: grid;
      gap: 1rem;
      margin-top: 1rem;
    }
    .registration-card {
      border: 1px solid #242424;
      background: #0d0d0d;
      padding: 1rem;
    }
    .registration-card-head {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.85rem;
    }
    .registration-team {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      color: var(--white);
    }
    .registration-time {
      color: var(--muted);
      font-size: 11px;
      text-align: right;
    }
    .registration-answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.7rem 1rem;
    }
    .answer-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 0.2rem;
    }
    .answer-value {
      color: rgba(242,242,238,0.72);
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .btn-edit,
    .btn-delete {
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.45rem 0.85rem;
      border: none; cursor: pointer; transition: opacity 0.2s;
    }

    .btn-edit {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: var(--white);
    }
    .btn-edit:hover { border-color: var(--green); color: var(--green); }

    .btn-delete {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #e05555;
    }
    .btn-delete:hover { border-color: #e05555; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .registration-answers { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="admin-nav">
    <div class="nav-left">
      <a href="index.html" aria-label="RHM home">
        <img src="RHM-Logo.png" alt="RHM Logo">
      </a>
      <span class="nav-label">Admin Panel</span>
    </div>
    <div class="nav-right">
      <a href="admin-login.html" data-admin-logout>Logout</a>
    </div>
  </nav>

  <main class="main">
    <div class="page-label">Admin › Events</div>
    <h1 class="page-headline">Manage Events</h1>

    <div class="layout">

      <!-- FORM -->
      <div class="form-panel">
        <div class="panel-title">Create New Event</div>
        <form class="form" onsubmit="addEvent(event)">
          <div class="field">
            <label for="ev-name">Event Name</label>
            <input type="text" id="ev-name" placeholder="e.g. RHM Flag Football Tournament" required>
          </div>

          <div class="row-2">
            <div class="field">
              <label for="ev-sport">Sport</label>
              <select id="ev-sport">
                <option value="flag-football">Flag Football</option>
                <option value="basketball">Basketball</option>
                <option value="soccer">Soccer</option>
                <option value="volleyball">Volleyball</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="field">
              <label for="ev-status">Status</label>
              <select id="ev-status">
                <option value="open">Registration Open</option>
                <option value="closed">Registration Closed</option>
                <option value="soon">Coming Soon</option>
              </select>
            </div>
          </div>

          <div class="row-2">
            <div class="field">
              <label for="ev-date">Date</label>
              <input type="date" id="ev-date" required>
            </div>
            <div class="field">
              <label for="ev-time">Time</label>
              <input type="time" id="ev-time">
            </div>
          </div>

          <div class="field">
            <label for="ev-location">Location</label>
            <input type="text" id="ev-location" placeholder="e.g. Mississauga Sports Park">
          </div>

          <div class="field">
            <label for="ev-desc">Description</label>
            <textarea id="ev-desc" placeholder="Short event description…"></textarea>
          </div>

          <label class="field check-row" for="reg-enabled">
            <input type="checkbox" id="reg-enabled" checked onchange="toggleRegistrationBuilder()">
            Enable registration form
          </label>

          <div class="builder-panel active" id="reg-builder-panel">
            <div class="builder-head">
              <div class="builder-title">Registration Form Builder</div>
              <button class="btn-small" type="button" onclick="addRegistrationQuestion()">Add Question</button>
            </div>
            <label class="field check-row" for="reg-payment-required">
              <input type="checkbox" id="reg-payment-required">
              Require payment after registration
            </label>
            <div class="field">
              <label for="reg-payment-link">Stripe Payment Link</label>
              <input type="url" id="reg-payment-link" placeholder="Add later, e.g. https://buy.stripe.com/...">
            </div>
            <div id="reg-builder"></div>
          </div>

          <button type="submit" class="btn-post">Post Event</button>
        </form>
      </div>

      <!-- EVENT LIST -->
      <div class="list-panel">
        <div class="list-header">
          <div class="list-title">Current Events</div>
          <span class="event-count" id="ev-count">1 event</span>
        </div>

        <div id="events-list">

          <!-- Sample: Flag Football Tournament -->
          <div class="event-card" id="ev-sample">
            <div class="event-info">
              <div class="event-name">RHM Flag Football Tournament</div>
              <div class="event-meta">
                <span>🗓 June 14, 2025</span>
                <span>🕙 10:00 AM</span>
                <span>📍 Mississauga Sports Park</span>
                <span>🏈 Flag Football</span>
              </div>
              <span class="badge badge-open">Registration Open</span>
            </div>
            <div class="event-actions">
              <button class="btn-edit">Edit</button>
              <button class="btn-delete" onclick="deleteEvent('ev-sample')">Delete</button>
            </div>
          </div>

        </div>
      </div>

    </div>

    <section class="registrations-panel">
      <div class="list-header">
        <div class="list-title">Registrations</div>
        <span class="event-count" id="registration-count">0 submissions</span>
      </div>
      <div class="registrations-list" id="registrations-list">
        <div class="event-card">No registrations yet.</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/admin-auth.js"></script>
  <script src="assets/js/events-store.js"></script>
  <script>
    let eventCount = 0;

    const statusMap = {
      open: { label: 'Registration Open', cls: 'badge-open' },
      closed: { label: 'Registration Closed', cls: 'badge-closed' },
      soon: { label: 'Coming Soon', cls: 'badge-soon' },
    };

    const sportEmoji = {
      'flag-football': '🏈',
      'basketball': '🏀',
      'soccer': '⚽',
      'volleyball': '🏐',
      'other': '🎯',
    };
    let registrationQuestions = [];

    function eh(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function defaultRegistrationQuestions() {
      return JSON.parse(JSON.stringify(window.RHMEventsStore.defaultRegistrationQuestions || []));
    }

    function toggleRegistrationBuilder() {
      document.getElementById('reg-builder-panel').classList.toggle('active', document.getElementById('reg-enabled').checked);
    }

    function renderRegistrationBuilder() {
      const builder = document.getElementById('reg-builder');
      builder.innerHTML = registrationQuestions.map((question, index) => `
        <div class="question-card" data-question-index="${index}">
          <div class="row-2">
            <div class="field">
              <label>Question Label</label>
              <input type="text" value="${eh(question.label)}" oninput="updateRegistrationQuestion(${index}, 'label', this.value)" required>
            </div>
            <div class="field">
              <label>Field Type</label>
              <select onchange="updateRegistrationQuestion(${index}, 'type', this.value)">
                ${['text','email','phone','number','textarea','checkbox'].map(type => `<option value="${type}" ${question.type === type ? 'selected' : ''}>${type}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="row-2">
            <div class="field">
              <label>Min</label>
              <input type="number" value="${question.min ?? ''}" oninput="updateRegistrationQuestion(${index}, 'min', this.value)">
            </div>
            <div class="field">
              <label>Max</label>
              <input type="number" value="${question.max ?? ''}" oninput="updateRegistrationQuestion(${index}, 'max', this.value)">
            </div>
          </div>
          <div class="field">
            <label>Help Text</label>
            <input type="text" value="${eh(question.help || '')}" oninput="updateRegistrationQuestion(${index}, 'help', this.value)">
          </div>
          <div class="question-actions">
            <label><input type="checkbox" ${question.required !== false ? 'checked' : ''} onchange="updateRegistrationQuestion(${index}, 'required', this.checked)"> Required</label>
            <button class="btn-remove" type="button" onclick="removeRegistrationQuestion(${index})">Remove</button>
          </div>
        </div>
      `).join('');
    }

    function updateRegistrationQuestion(index, key, value) {
      const question = registrationQuestions[index];
      if (!question) return;
      if (key === 'required') {
        question.required = value === true;
      } else if (key === 'min' || key === 'max') {
        question[key] = value === '' ? null : Number(value);
      } else {
        question[key] = value;
      }
    }

    function addRegistrationQuestion() {
      registrationQuestions.push({
        id: 'custom_' + Date.now(),
        label: 'New Question',
        type: 'text',
        required: false,
        min: null,
        max: null,
        help: ''
      });
      renderRegistrationBuilder();
    }

    function removeRegistrationQuestion(index) {
      registrationQuestions.splice(index, 1);
      renderRegistrationBuilder();
    }

    function collectRegistrationConfig() {
      return window.RHMEventsStore.normalizeRegistration({
        enabled: document.getElementById('reg-enabled').checked,
        paymentRequired: document.getElementById('reg-payment-required').checked,
        paymentLink: document.getElementById('reg-payment-link').value.trim(),
        questions: registrationQuestions
      });
    }

    function eventCardHTML(event) {
      return `
        <div class="event-info">
          <div class="event-name">${eh(event.title)}</div>
          <div class="event-meta">
            ${event.dateLabel ? `<span>🗓 ${eh(event.dateLabel)}</span>` : ''}
            ${event.timeLabel ? `<span>🕙 ${eh(event.timeLabel)}</span>` : ''}
            ${event.location ? `<span>📍 ${eh(event.location)}</span>` : ''}
            <span>${event.sportIcon || sportEmoji[event.sport] || '🎯'} ${eh(event.sportLabel)}</span>
          </div>
          <span class="badge ${event.statusClass}">${eh(event.statusLabel)}</span>
        </div>
        <div class="event-actions">
          <button class="btn-edit" type="button">Edit</button>
          <button class="btn-delete" type="button" onclick="deleteEvent('${event.id}')">Delete</button>
        </div>
      `;
    }

    function answerEntries(registration) {
      const answers = registration.answers || {};
      return Object.keys(answers).map(key => {
        const answer = answers[key] || {};
        return {
          label: answer.label || key,
          value: answer.value || ''
        };
      });
    }

    function primaryRegistrationName(registration) {
      const answers = registration.answers || {};
      return answers.team_name?.value ||
        [answers.first_name?.value, answers.last_name?.value].filter(Boolean).join(' ') ||
        registration.event_name ||
        'Registration';
    }

    function renderRegistrations(registrations) {
      const list = document.getElementById('registrations-list');
      const count = document.getElementById('registration-count');
      count.textContent = registrations.length + ' submission' + (registrations.length !== 1 ? 's' : '');

      if (!registrations.length) {
        list.innerHTML = '<div class="event-card">No registrations yet.</div>';
        return;
      }

      list.innerHTML = registrations.map(registration => `
        <div class="registration-card">
          <div class="registration-card-head">
            <div>
              <div class="registration-team">${eh(primaryRegistrationName(registration))}</div>
              <div class="event-meta"><span>${eh(registration.event_name || '')}</span><span>${eh(registration.payment_status || 'pending')}</span></div>
            </div>
            <div class="registration-time">${registration.submitted_at ? eh(new Date(registration.submitted_at).toLocaleString()) : ''}</div>
          </div>
          <div class="registration-answers">
            ${answerEntries(registration).map(answer => `
              <div>
                <span class="answer-label">${eh(answer.label)}</span>
                <div class="answer-value">${eh(answer.value)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderEvents(events) {
      const list = document.getElementById('events-list');
      list.innerHTML = '';
      events.forEach(event => {
        const card = document.createElement('div');
        card.className = 'event-card';
        card.id = event.id;
        card.innerHTML = eventCardHTML(event);
        list.appendChild(card);
      });
      eventCount = events.length;
      document.getElementById('ev-count').textContent = eventCount + ' event' + (eventCount !== 1 ? 's' : '');
    }

    async function addEvent(e) {
      e.preventDefault();
      const name = document.getElementById('ev-name').value.trim();
      const sport = document.getElementById('ev-sport').value;
      const status = document.getElementById('ev-status').value;
      const date = document.getElementById('ev-date').value;
      const time = document.getElementById('ev-time').value;
      const location = document.getElementById('ev-location').value.trim();
      const description = document.getElementById('ev-desc').value.trim();

      const created = await window.RHMEventsStore.createEvent({
        title: name,
        sport: sport,
        status: status,
        date: date,
        time: time,
        location: location,
        description: description,
        registration: collectRegistrationConfig()
      });

      const card = document.createElement('div');
      card.className = 'event-card';
      card.id = created.id;
      card.innerHTML = eventCardHTML(created);

      document.getElementById('events-list').prepend(card);
      eventCount++;
      document.getElementById('ev-count').textContent = eventCount + ' event' + (eventCount !== 1 ? 's' : '');
      e.target.reset();
      document.getElementById('reg-enabled').checked = true;
      document.getElementById('reg-payment-required').checked = false;
      document.getElementById('reg-payment-link').value = '';
      registrationQuestions = defaultRegistrationQuestions();
      toggleRegistrationBuilder();
      renderRegistrationBuilder();
    }

    async function deleteEvent(id) {
      await window.RHMEventsStore.deleteEvent(id);
      const el = document.getElementById(id);
      if (el) {
        el.remove();
        eventCount = Math.max(0, eventCount - 1);
        document.getElementById('ev-count').textContent = eventCount + ' event' + (eventCount !== 1 ? 's' : '');
      }
    }

    async function initAdminEvents() {
      window.RHMAdminAuth.wireLogoutLinks();
      const admin = await window.RHMAdminAuth.requireAdmin();
      if (!admin) return;
      renderEvents(await window.RHMEventsStore.listAdminEvents());
      renderRegistrations(await window.RHMEventsStore.listRegistrations());
      registrationQuestions = defaultRegistrationQuestions();
      renderRegistrationBuilder();
    }

    initAdminEvents().catch(error => {
      document.getElementById('events-list').innerHTML = '<div class="event-card">' + eh(error.message || 'Could not load events.') + '</div>';
    });
  </script>

</body>
</html>
