<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Results — RHM Tournament</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #2db84b;
      --black: #0a0a0a;
      --white: #f2f2ee;
      --muted: #888;
      --surface: #111;
      --surface2: #161616;
      --border: #1e1e1e;
      --border2: #2a2a2a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* ── HEADER ── */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .header-left a { display: flex; align-items: center; }
    .header-left img { height: 36px; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--green);
    }
    .live-dot {
      width: 7px; height: 7px; background: var(--green); border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.85)} }
    .refresh-label { font-size: 11px; color: #444; letter-spacing: 0.06em; }

    /* ── MAIN ── */
    .main { max-width: 1300px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

    /* ── HERO ── */
    .t-hero { margin-bottom: 2.5rem; }
    .t-sport-tag {
      font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--green); margin-bottom: 0.5rem;
    }
    .t-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.25rem; letter-spacing: 0.06em; color: var(--white); line-height: 1;
      margin-bottom: 0.5rem;
    }
    .t-meta { font-size: 13px; color: var(--muted); }

    /* ── TABS ── */
    .tab-nav {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin-bottom: 2rem; overflow-x: auto;
    }
    .tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--muted); font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem; letter-spacing: 0.08em; padding: 0.85rem 1.4rem;
      cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
    .live-panel { display: none; }
    .live-panel.active { display: block; }

    /* ── SECTION LABEL ── */
    .sec-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem; letter-spacing: 0.1em; color: var(--white);
      margin-bottom: 1rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .sec-wrap { margin-bottom: 2.5rem; }

    /* ── STANDINGS ── */
    .standings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; margin-bottom: 0; }
    .stg-block { }
    .stg-name {
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.1em;
      color: var(--green); margin-bottom: 0.5rem;
    }
    .stg-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .stg-tbl th {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); padding: 0.45rem 0.5rem; text-align: left; border-bottom: 1px solid var(--border);
    }
    .stg-tbl td { padding: 0.5rem 0.5rem; border-bottom: 1px solid #181818; }
    .stg-tbl tr:nth-child(even) td { background: #131313; }
    .stg-tbl tr.adv td { background: rgba(45,184,75,0.07); }
    .stg-tbl tr.adv td:first-child { border-left: 2px solid var(--green); padding-left: calc(0.5rem - 2px); }
    .stg-rank { font-weight: 700; color: #555; }
    .diff-p { color: var(--green); }
    .diff-n { color: #e05555; }

    /* ── SCHEDULE GRID ── */
    .sched-wrap { overflow-x: auto; }
    .sched-table { border-collapse: collapse; min-width: 500px; width: 100%; }
    .sched-table th {
      background: var(--green); color: #fff; font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 0.55rem 0.75rem;
      text-align: left; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1);
    }
    .sched-table th:first-child { background: #1a1a1a; color: var(--muted); width: 90px; }
    .sched-table td {
      border: 1px solid var(--border); padding: 0.4rem; vertical-align: top;
      background: var(--surface); min-width: 145px;
    }
    .sched-table td:first-child {
      background: #131313; font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); vertical-align: middle; min-width: 75px;
    }
    .sched-table td.empty-cell { background: #0c0c0c; }

    /* ── GAME CARD (read-only) ── */
    .game-card { padding: 0.45rem 0.5rem; min-height: 70px; }
    .game-card.scored { background: rgba(45,184,75,0.05); }
    .gc-group { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--green); margin-bottom: 0.25rem; }
    .gc-teams { font-size: 12px; font-weight: 600; color: var(--white); line-height: 1.5; }
    .gc-score-line { font-size: 14px; font-weight: 700; color: var(--white); margin-top: 0.25rem; }
    .gc-score-line .winner-sc { color: var(--green); }
    .gc-vs { font-size: 11px; color: var(--muted); margin-top: 0.2rem; }
    .gc-ref { font-size: 10px; color: #3d3d3d; margin-top: 0.2rem; }
    .score-tbd { font-size: 10px; color: #444; font-style: italic; margin-top: 0.3rem; }

    /* ── BRACKET ── */
    .bracket-outer { overflow-x: auto; padding-bottom: 1rem; }
    .bracket-flex { display: flex; align-items: stretch; min-width: max-content; padding: 0.5rem 0; }
    .r-col { display: flex; flex-direction: column; }
    .r-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; letter-spacing: 0.12em; color: var(--green); text-align: center; padding: 0 1.25rem 0.75rem; white-space: nowrap; }
    .r-matches { display: flex; flex-direction: column; flex: 1; }
    .b-slot { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
    .b-card { width: 150px; border: 1px solid var(--border); background: var(--surface); position: relative; z-index: 1; }
    .b-team { padding: 0.5rem 0.7rem; font-size: 12px; font-weight: 500; color: var(--white); border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; }
    .b-team:last-child { border-bottom: none; }
    .b-team.tbd { color: #3a3a3a; font-style: italic; }
    .b-team.win { color: var(--green); font-weight: 700; }
    .b-sc { font-size: 11px; font-weight: 700; color: var(--muted); flex-shrink: 0; margin-left: 4px; }
    .lines-col { width: 40px; position: relative; flex-shrink: 0; }
    .lines-col svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
    .champ-col { display: flex; flex-direction: column; }
    .champ-slot { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 1.25rem; }
    .champ-card { width: 150px; border: 1px solid var(--green); background: rgba(45,184,75,0.07); padding: 1rem; text-align: center; }
    .champ-ico { font-size: 1.5rem; margin-bottom: 0.35rem; }
    .champ-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--green); margin-bottom: 0.25rem; }
    .champ-nm { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em; color: var(--white); }

    /* ── NOTICE / EMPTY ── */
    .notice {
      padding: 3rem 2rem; border: 1px dashed var(--border2);
      color: var(--muted); font-size: 14px; text-align: center;
    }
    .notice strong { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.08em; color: #333; margin-bottom: 0.5rem; }

    /* ── FOOTER ── */
    .live-footer {
      text-align: center; padding: 2rem;
      font-size: 12px; color: #333; border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    @media (max-width: 700px) {
      .site-header { padding: 0 1rem; }
      .main { padding: 1.5rem 1rem 3rem; }
      .t-name { font-size: 2.25rem; }
      .standings-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-left">
      <a href="index.html" aria-label="RHM home">
        <img src="RHM-Logo.png" alt="RHM">
      </a>
    </div>
    <div class="header-right">
      <span class="live-badge" id="live-badge" style="display:none">
        <span class="live-dot"></span>Live
      </span>
      <span class="refresh-label" id="refresh-label">—</span>
    </div>
  </header>

  <main class="main" id="main-content">
    <div class="notice"><strong>No Tournament Active</strong>Set up a tournament in the admin panel to see live results here.</div>
  </main>

  <div class="live-footer" id="live-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/tournament-standings.js"></script>
<script src="assets/js/tournament-engine.js"></script>
<script src="assets/js/tournament-store.js"></script>
<script>
const GL = ['A','B','C','D'];
const ADV = { top1:1, top2:2, top4:4 };
let lastUpdated = null;

async function loadData() {
  return await window.RHMTournamentStore.loadPublicTournamentState();
}

async function render() {
  const S = await loadData();
  const main = document.getElementById('main-content');
  const badge = document.getElementById('live-badge');
  const footer = document.getElementById('live-footer');
  const div = getActiveDivision(S);
  const fixtures = div.fixtures || [];
  const activeTab = getCurrentLiveTab();

  if (!S || !fixtures.length) {
    badge.style.display = 'none';
    main.innerHTML = '<div class="notice"><strong>No Tournament Active</strong>Set up a tournament in the admin panel to see live results here.</div>';
    footer.innerHTML = '';
    return;
  }

  badge.style.display = 'flex';
  lastUpdated = new Date();
  document.getElementById('refresh-label').textContent = 'Updated ' + lastUpdated.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  let html = '';
  const display = getDisplaySettings(S, div);
  const standings = computeDivisionStandings(div);
  const advance = ADV[(div.settings || {}).playoffFormat] || 2;
  const seeds = projectDivisionSeeds(div, standings);

  // ── Hero
  html += `<div class="t-hero">
    <div class="t-sport-tag">${eh(display.sport)}</div>
    <div class="t-name">${eh(display.name || 'RHM Tournament')}</div>
    <div class="t-meta">Live results · Auto-refreshes every 30 seconds</div>
  </div>`;

  html += `
  <div class="tab-nav" style="margin-top:1.5rem;">
    <button class="tab-btn active" data-live-tab="schedule" onclick="switchLiveTab('schedule')">Schedule</button>
    <button class="tab-btn" data-live-tab="standings" onclick="switchLiveTab('standings')">Standings</button>
    <button class="tab-btn" data-live-tab="bracket" onclick="switchLiveTab('bracket')">Bracket</button>
  </div>
`;

  html += `<div class="live-panel active" id="live-panel-schedule">${renderSchedulePanel(div, fixtures, seeds)}</div>`;
  html += `<div class="live-panel" id="live-panel-standings">${renderStandingsPanel(standings, advance)}</div>`;
  html += '<div class="live-panel" id="live-panel-bracket"><div class="sec-wrap"><div class="sec-label">Playoff Bracket</div><div id="bracket-area" class="bracket-outer"></div></div></div>';

  main.innerHTML = html;
  renderBracket(div, seeds);
  switchLiveTab(activeTab);

  footer.innerHTML = `Auto-refreshes every 30 seconds &nbsp;·&nbsp; Last updated: ${lastUpdated.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
}

function getCurrentLiveTab() {
  const active = document.querySelector('[data-live-tab].active');
  return active?.dataset.liveTab || 'schedule';
}

function switchLiveTab(tab) {
  const nextTab = document.querySelector(`[data-live-tab="${tab}"]`) ? tab : 'schedule';
  document.querySelectorAll('[data-live-tab]').forEach(button => {
    button.classList.toggle('active', button.dataset.liveTab === nextTab);
  });
  document.querySelectorAll('.live-panel').forEach(panel => {
    panel.classList.toggle('active', panel.id === 'live-panel-' + nextTab);
  });
}

function getActiveDivision(S) {
  if (!S) return { settings:{}, groups:[], venues:[], fixtures:[], seedOverrides:[] };
  if (S.divisions && S.divisions.length) return normalizeDivision(S.divisions[0], S);
  return deriveLegacyDivision(S);
}

function normalizeDivision(raw, S) {
  const div = Object.assign({}, raw || {});
  div.settings = Object.assign({}, div.settings || {});
  div.groups = normalizeGroups(div.groups || []);
  div.fixtures = normalizeFixtures(div.fixtures || []);
  div.venues = deriveVenues(div, div.fixtures, S);
  div.seedOverrides = div.seedOverrides || [];
  return div;
}

function deriveLegacyDivision(S) {
  const settings = Object.assign({
    playoffFormat: 'top2',
    sport: 'Flag Football'
  }, S.settings || {});
  const groups = normalizeGroups(S.groups || []);
  const venues = deriveLegacyVenues(S, settings);
  const groupFixtures = (S.schedule || []).map(g => {
    const groupIndex = Number.isFinite(Number(g.gi)) ? Number(g.gi) : 0;
    const fieldIndex = Number.isFinite(Number(g.field)) ? Number(g.field) : 0;
    return {
      id: g.id || 'legacy-group-' + groupIndex + '-' + (g.slot || 0) + '-' + fieldIndex,
      divisionId: 'division-main',
      phase: 'group',
      groupId: groups[groupIndex]?.id || 'group-' + String(GL[groupIndex] || groupIndex + 1).toLowerCase(),
      groupName: g.gName || groups[groupIndex]?.name || 'Group ' + (GL[groupIndex] || groupIndex + 1),
      teamA: g.tA,
      teamB: g.tB,
      venueId: venues[fieldIndex]?.id || 'venue-' + (fieldIndex + 1),
      venueName: venues[fieldIndex]?.name || 'Field ' + (fieldIndex + 1),
      venueIndex: fieldIndex,
      slot: g.slot,
      startsAt: g.time || g.startsAt,
      scoreA: g.scoreA ?? null,
      scoreB: g.scoreB ?? null,
      ref: g.ref || '',
      status: isScored(g) ? 'final' : 'scheduled'
    };
  });
  const playoffFixtures = deriveLegacyPlayoffFixtures(S, groups, settings);

  return {
    id: 'division-main',
    name: 'Main Division',
    sport: settings.sport,
    settings: settings,
    groups: groups,
    venues: venues,
    fixtures: groupFixtures.concat(playoffFixtures),
    seedOverrides: []
  };
}

function deriveLegacyVenues(S, settings) {
  const schedule = S.schedule || [];
  const maxField = schedule.length ? Math.max.apply(null, schedule.map(g => Number.isFinite(Number(g.field)) ? Number(g.field) : 0)) : -1;
  const total = Math.max(1, maxField + 1, parseInt(settings.effectiveFields || settings.numFields, 10) || 1);
  return Array.from({ length: total }, (_, index) => ({
    id: 'venue-' + (index + 1),
    name: venueDefaultName(settings.sport, index),
    index: index
  }));
}

function deriveLegacyPlayoffFixtures(S, groups, settings) {
  if (!(S.schedule || []).length && !(S.playoffs || []).length) return [];
  if (window.RHMTournamentEngine && typeof window.RHMTournamentEngine.buildPlayoffFixtures === 'function') {
    return window.RHMTournamentEngine.buildPlayoffFixtures({
      divisionId: 'division-main',
      groups: groups,
      settings: settings
    });
  }
  return [];
}

function normalizeGroups(groups) {
  return (groups || []).map((group, index) => ({
    id: group.id || 'group-' + String(GL[index] || index + 1).toLowerCase(),
    name: group.name || 'Group ' + (GL[index] || index + 1),
    teams: (group.teams || []).map(team => String(team || '').trim()).filter(Boolean)
  }));
}

function normalizeFixtures(fixtures) {
  return (fixtures || []).map(fixture => Object.assign({}, fixture, {
    scoreA: fixture.scoreA ?? null,
    scoreB: fixture.scoreB ?? null
  }));
}

function deriveVenues(div, fixtures, S) {
  if (div.venues && div.venues.length) {
    return div.venues.map((venue, index) => ({
      id: venue.id || 'venue-' + (index + 1),
      name: venue.name || venueDefaultName(div.sport || S?.settings?.sport, index),
      index: Number.isFinite(Number(venue.index)) ? Number(venue.index) : index
    }));
  }

  const seen = {};
  (fixtures || []).forEach(fixture => {
    const id = fixture.venueId || (Number.isFinite(Number(fixture.venueIndex)) ? 'venue-' + (Number(fixture.venueIndex) + 1) : '');
    if (!id || seen[id]) return;
    seen[id] = {
      id: id,
      name: fixture.venueName || id.replace(/^venue-/, 'Field '),
      index: Number.isFinite(Number(fixture.venueIndex)) ? Number(fixture.venueIndex) : Object.keys(seen).length
    };
  });

  const venues = Object.keys(seen).map(id => seen[id]).sort((a,b) => a.index - b.index);
  if (venues.length) return venues;

  const settings = div.settings || {};
  const total = Math.max(1, parseInt(settings.effectiveFields || settings.numFields, 10) || 1);
  return Array.from({ length: total }, (_, index) => ({
    id: 'venue-' + (index + 1),
    name: venueDefaultName(div.sport || S?.settings?.sport, index),
    index: index
  }));
}

function venueDefaultName(sport, index) {
  return (String(sport || '').includes('Basketball') ? 'Court ' : 'Field ') + (index + 1);
}

function getDisplaySettings(S, div) {
  const global = S.settings || {};
  const settings = div.settings || {};
  return {
    name: global.name || settings.name || div.name || 'RHM Tournament',
    sport: global.sport || div.sport || settings.sport || 'Tournament'
  };
}

function renderSchedulePanel(div, fixtures, seeds) {
  const scheduledFixtures = fixtures.filter(hasScheduleSlot);
  if (!scheduledFixtures.length) {
    return '<div class="sec-wrap"><div class="sec-label">Schedule</div><div class="notice">Schedule times are not available yet.</div></div>';
  }

  const slots = [...new Set(scheduledFixtures.map(g => g.slot))].sort((a,b)=>a-b);
  const timeOf = {};
  scheduledFixtures.forEach(g => { timeOf[g.slot] = g.startsAt || g.time || ('Slot ' + (Number(g.slot) + 1)); });
  const venues = deriveVenues(div, scheduledFixtures, {});

  let html = '<div class="sec-wrap"><div class="sec-label">Schedule</div><div class="sched-wrap"><table class="sched-table"><thead><tr><th>Venue</th>';
  slots.forEach(s => { html += `<th>${eh(timeOf[s])}</th>`; });
  html += '</tr></thead><tbody>';

  venues.forEach(venue => {
    html += `<tr><td>${eh(venue.name)}</td>`;
    slots.forEach(s => {
      const g = scheduledFixtures.find(x => fixtureVenueId(x) === venue.id && x.slot === s);
      if (!g) { html += '<td class="empty-cell"></td>'; return; }
      html += `<td>${renderGameCard(g, seeds, fixtures)}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table></div></div>';
  return html;
}

function renderGameCard(fixture, seeds, fixtures) {
  const scored = isScored(fixture);
  const teamA = fixtureTeamLabel(fixture, 'A', seeds, fixtures);
  const teamB = fixtureTeamLabel(fixture, 'B', seeds, fixtures);
  const phase = fixturePhaseLabel(fixture);

  if (scored) {
    const scoreA = Number(fixture.scoreA);
    const scoreB = Number(fixture.scoreB);
    const aWin = scoreA > scoreB || fixture.winner === teamA;
    const bWin = scoreB > scoreA || fixture.winner === teamB;
    return `
      <div class="game-card scored">
        <div class="gc-group">${eh(phase)}</div>
        <div class="gc-score-line">
          <span class="${aWin?'winner-sc':''}">${eh(teamA)} ${eh(scoreA)}</span>
          <span style="color:#444;margin:0 4px">—</span>
          <span class="${bWin?'winner-sc':''}">${eh(scoreB)} ${eh(teamB)}</span>
        </div>
        <div class="gc-ref">${renderFixtureMeta(fixture)}</div>
      </div>`;
  }

  return `
    <div class="game-card">
      <div class="gc-group">${eh(phase)}</div>
      <div class="gc-teams">${eh(teamA)} vs ${eh(teamB)}</div>
      <div class="gc-ref">${renderFixtureMeta(fixture)}</div>
      <div class="score-tbd">Score pending</div>
    </div>`;
}

function renderFixtureMeta(fixture) {
  if (fixture.phase === 'group') return 'Ref: ' + eh(fixture.ref || '-');
  return eh(fixture.roundName || 'Playoff');
}

function renderStandingsPanel(standings, advance) {
  let html = '<div class="sec-wrap"><div class="sec-label">Group Standings</div><div class="standings-grid">';
  standings.forEach(gs => {
    html += `<div class="stg-block">
      <div class="stg-name">${eh(gs.groupName)}</div>
      <table class="stg-tbl">
        <thead><tr><th>#</th><th>Team</th><th>Pts</th><th>W</th><th>D</th><th>L</th><th>PF</th><th>PA</th><th>+/-</th></tr></thead>
        <tbody>
          ${gs.rows.map((r,ri) => `
            <tr class="${ri<advance?'adv':''}">
              <td><span class="stg-rank">${r.rank || ri+1}</span></td>
              <td>${eh(r.team)}</td>
              <td>${r.points}</td><td>${r.wins}</td><td>${r.draws}</td><td>${r.losses}</td><td>${r.pf}</td><td>${r.pa}</td>
              <td class="${r.diff>0?'diff-p':r.diff<0?'diff-n':''}">${r.diff>0?'+':''}${r.diff}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  });
  html += '</div></div>';
  return standings.length ? html : '<div class="sec-wrap"><div class="sec-label">Group Standings</div><div class="notice">Standings are not available yet.</div></div>';
}

function computeDivisionStandings(div) {
  return window.RHMTournamentStandings.computeStandings({
    groups: div.groups || [],
    fixtures: div.fixtures || [],
    rules: div.settings || {}
  });
}

function projectDivisionSeeds(div, standings) {
  const advance = ADV[(div.settings || {}).playoffFormat] || 2;
  return window.RHMTournamentStandings.projectSeeds({
    standings: standings || computeDivisionStandings(div),
    seedOverrides: div.seedOverrides || [],
    advancePerGroup: advance,
    fixtures: div.fixtures || [],
    requireCompletedGroupStage: true
  });
}

function hasScheduleSlot(fixture) {
  return fixture && fixture.slot !== undefined && fixture.slot !== null && fixture.slot !== '';
}

function fixtureVenueId(fixture) {
  if (fixture.venueId) return fixture.venueId;
  if (Number.isFinite(Number(fixture.venueIndex))) return 'venue-' + (Number(fixture.venueIndex) + 1);
  return 'venue-1';
}

function isScored(fixture) {
  return fixture && fixture.scoreA !== null && fixture.scoreA !== '' && fixture.scoreB !== null && fixture.scoreB !== '';
}

function fixturePhaseLabel(fixture) {
  if (fixture.phase === 'playoff') return fixture.roundName || 'Playoff';
  return fixture.groupName || 'Group';
}

function resolveSeedSide(side, seeds, fixtures, seen) {
  if (!side) return 'TBD';
  if (!seeds || !seeds.length) return 'TBD';
  if (side.sourceFixtureId) {
    const source = (fixtures || []).find(fixture => fixture.id === side.sourceFixtureId);
    return fixtureWinner(source, seeds, fixtures, seen) || 'TBD';
  }
  const seed = (seeds || []).find(item => item.groupId === side.groupId && item.seed === side.seed);
  return seed?.team || 'TBD';
}

function fixtureTeamLabel(fixture, side, seeds, fixtures, seen) {
  if (!fixture) return 'TBD';
  const key = side === 'A' ? 'teamA' : 'teamB';
  const seedKey = side === 'A' ? 'seedA' : 'seedB';
  return fixture[key] || resolveSeedSide(fixture[seedKey], seeds, fixtures, seen);
}

function fixtureWinner(fixture, seeds, fixtures, seen) {
  if (!fixture) return null;
  const visited = seen || {};
  if (visited[fixture.id]) return fixture.winner || null;
  visited[fixture.id] = true;
  if (fixture.winner) return fixture.winner;
  if (!isScored(fixture)) return null;
  const scoreA = Number(fixture.scoreA);
  const scoreB = Number(fixture.scoreB);
  if (scoreA === scoreB) return null;
  return fixtureTeamLabel(fixture, scoreA > scoreB ? 'A' : 'B', seeds, fixtures, visited);
}

function renderBracket(div, seeds) {
  const container = document.getElementById('bracket-area');
  const playoffs = (div.fixtures || []).filter(fixture => fixture.phase === 'playoff');
  if (!container) return;
  if (!playoffs.length) {
    container.innerHTML = '<div class="notice" style="padding:1.5rem;border-style:dashed">Playoffs begin after group stage.</div>';
    return;
  }

  const byRound = {};
  playoffs.forEach(fixture => { (byRound[fixture.roundIndex || 0] = byRound[fixture.roundIndex || 0] || []).push(fixture); });
  const rounds = Object.keys(byRound).map(Number).sort((a,b)=>a-b).map(index => byRound[index].sort((a,b)=>(a.matchIndex||0)-(b.matchIndex||0)));
  const totalSlots = Math.max.apply(null, rounds.map(round => round.length));
  const wrap = document.createElement('div');
  wrap.className = 'bracket-flex';

  rounds.forEach((matches, ri) => {
    const col = document.createElement('div');
    col.className = 'r-col';
    col.innerHTML = `<div class="r-label">${eh(matches[0]?.roundName || 'Round ' + (ri + 1))}</div>`;
    const mc = document.createElement('div');
    mc.className = 'r-matches';
    const flex = totalSlots / matches.length;
    matches.forEach(m => {
      const slot = document.createElement('div');
      slot.className = 'b-slot';
      slot.style.flex = flex;
      const card = document.createElement('div');
      card.className = 'b-card';
      ['A','B'].forEach(side => {
        const team = fixtureTeamLabel(m, side, seeds, div.fixtures || []);
        const row = document.createElement('div');
        const tbd = !team || team === 'TBD';
        const winner = fixtureWinner(m, seeds, div.fixtures || []) === team;
        row.className = 'b-team' + (tbd ? ' tbd' : '');
        if (winner) row.className += ' win';
        const span = document.createElement('span');
        span.textContent = team || 'TBD';
        row.appendChild(span);
        if (isScored(m)) {
          const score = document.createElement('span');
          score.className = 'b-sc';
          score.textContent = side === 'A' ? m.scoreA : m.scoreB;
          row.appendChild(score);
        }
        card.appendChild(row);
      });
      slot.appendChild(card);
      mc.appendChild(slot);
    });
    col.appendChild(mc);
    wrap.appendChild(col);

    if (ri < rounds.length - 1) {
      const lc = document.createElement('div');
      lc.className = 'lines-col';
      lc.dataset.ri = ri;
      lc.innerHTML = '<svg></svg>';
      wrap.appendChild(lc);
    }
  });

  const cc = document.createElement('div');
  cc.className = 'champ-col';
  cc.innerHTML = `<div class="r-label">Champion</div>`;
  const cs = document.createElement('div');
  cs.className = 'champ-slot';
  cs.style.flex = totalSlots;
  const finalFixture = playoffs.slice().sort((a,b)=>(b.roundIndex||0)-(a.roundIndex||0))[0];
  cs.innerHTML = `<div class="champ-card"><div class="champ-lbl">Winner</div><div class="champ-nm">${eh(fixtureWinner(finalFixture, seeds, div.fixtures || []) || 'TBD')}</div></div>`;
  cc.appendChild(cs);
  wrap.appendChild(cc);

  container.innerHTML = '';
  container.appendChild(wrap);

  requestAnimationFrame(() => {
    wrap.querySelectorAll('.lines-col').forEach(lc => {
      const ri = parseInt(lc.dataset.ri);
      const cols = wrap.querySelectorAll('.r-col');
      const fromCds = Array.from(cols[ri].querySelectorAll('.b-card'));
      const toCds = Array.from(cols[ri+1].querySelectorAll('.b-card'));
      const svg = lc.querySelector('svg');
      const lr = lc.getBoundingClientRect();
      const mx = lr.width / 2;
      const lines = [];
      toCds.forEach((tc, i) => {
        const a = fromCds[i*2], b = fromCds[i*2+1];
        const cr = tc.getBoundingClientRect();
        const cy = cr.top + cr.height/2 - lr.top, cx = cr.left - lr.left;
        if (a) {
          const ar = a.getBoundingClientRect();
          const ay = ar.top + ar.height/2 - lr.top, ax = ar.right - lr.left;
          if (b) {
            const br = b.getBoundingClientRect();
            const by = br.top + br.height/2 - lr.top;
            lines.push(`
              <line x1="${ax}" y1="${ay}" x2="${mx}" y2="${ay}" stroke="#2a2a2a" stroke-width="1"/>
              <line x1="${br.right-lr.left}" y1="${by}" x2="${mx}" y2="${by}" stroke="#2a2a2a" stroke-width="1"/>
              <line x1="${mx}" y1="${ay}" x2="${mx}" y2="${by}" stroke="#2a2a2a" stroke-width="1"/>
              <line x1="${mx}" y1="${(ay+by)/2}" x2="${cx}" y2="${cy}" stroke="#2a2a2a" stroke-width="1"/>
            `);
          } else {
            lines.push(`<line x1="${ax}" y1="${ay}" x2="${cx}" y2="${cy}" stroke="#2a2a2a" stroke-width="1"/>`);
          }
        }
      });
      svg.innerHTML = lines.join('');
    });
  });
}
function eh(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INIT + AUTO-REFRESH ──
render().catch(error => console.error(error));
setInterval(() => render().catch(error => console.error(error)), 30000);
</script>
</body>
</html>
