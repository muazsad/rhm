<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHM Admin — Tournament Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #2db84b;
      --black: #0a0a0a;
      --white: #f2f2ee;
      --muted: #888;
      --surface: #111;
      --surface2: #161616;
      --border: #1e1e1e;
      --border2: #2a2a2a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* ── NAVBAR ── */
    .admin-nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 64px;
      position: sticky; top: 0; z-index: 200;
    }
    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .nav-left img { height: 36px; }
    .nav-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted);
      border-left: 1px solid var(--border2); padding-left: 1rem;
    }
    .nav-right { display: flex; gap: 1.5rem; align-items: center; }
    .nav-right a, .nav-right button {
      font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; background: none; border: none; cursor: pointer;
      transition: color 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .nav-right a:hover { color: var(--white); }
    .nav-right .btn-reset { color: #e05555; }
    .nav-right .btn-reset:hover { color: #ff7070; }

    /* ── TAB NAV ── */
    .tab-nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; padding: 0 2.5rem; gap: 0.25rem;
      position: sticky; top: 64px; z-index: 199;
    }
    .tab-btn {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 0.1em;
      color: var(--muted); padding: 0.9rem 1.75rem;
      border: none; border-bottom: 3px solid transparent;
      background: none; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      display: flex; flex-direction: column; align-items: flex-start;
    }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
    .tab-step { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #555; margin-bottom: 1px; }
    .tab-btn.active .tab-step { color: rgba(45,184,75,0.6); }

    /* ── PANELS ── */
    .panel { display: none; padding: 2.5rem; max-width: 1400px; margin: 0 auto; }
    .panel.active { display: block; }
    .page-label { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--green); margin-bottom: 0.5rem; }
    .page-headline { font-family: 'Bebas Neue', sans-serif; font-size: 2.75rem; letter-spacing: 0.06em; color: var(--white); margin-bottom: 1.75rem; line-height: 1; }

    /* ── FORM ELEMENTS ── */
    .f-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.35rem; }
    .f-input, .f-select {
      background: #0d0d0d; border: 1px solid var(--border2);
      color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 0.7rem 0.9rem; outline: none; transition: border-color 0.2s; width: 100%;
    }
    .f-input:focus, .f-select:focus { border-color: var(--green); }
    .f-input::placeholder { color: #3a3a3a; }
    .f-select { appearance: none; cursor: pointer; }
    .f-row { margin-bottom: 1rem; }
    .f-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* ── BUTTONS ── */
    .btn-primary {
      background: var(--green); color: #fff; font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem; letter-spacing: 0.12em; border: none;
      padding: 0.8rem 2rem; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: #27a343; }
    .sched-header .btn-reset {
      background: transparent; color: #e05555; font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem; letter-spacing: 0.12em; border: 1px solid var(--border2);
      padding: 0.75rem 1.25rem; cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .sched-header .btn-reset:hover { border-color: #e05555; color: #ff7070; }
    .btn-sm-outline {
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 0.35rem 0.7rem; background: transparent; border: 1px solid var(--border2);
      color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .btn-sm-outline:hover { border-color: var(--green); color: var(--green); }
    .btn-sm-danger {
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      padding: 0.35rem 0.6rem; background: transparent; border: 1px solid var(--border2);
      color: #e05555; cursor: pointer; transition: border-color 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .btn-sm-danger:hover { border-color: #e05555; }
    .btn-score {
      background: var(--green); color: #fff; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; border: none;
      padding: 0.28rem 0.55rem; cursor: pointer; transition: background 0.15s; white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-score:hover { background: #27a343; }

    /* ── SECTION CARD ── */
    .s-card { background: var(--surface); border: 1px solid var(--border); padding: 1.75rem; margin-bottom: 1.5rem; }
    .s-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; letter-spacing: 0.08em; color: var(--white); margin-bottom: 1.25rem; }

    /* ── SETUP LAYOUT ── */
    .setup-grid { display: grid; grid-template-columns: 370px 1fr; gap: 1.5rem; }
    .group-block {
      background: var(--surface2); border: 1px solid var(--border);
      padding: 1.25rem 1.25rem 1rem; margin-bottom: 1rem;
    }
    .group-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; }
    .group-name-tag {
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
      letter-spacing: 0.1em; color: var(--green);
    }
    .group-team-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .team-num { font-size: 11px; font-weight: 600; color: #444; width: 18px; text-align: right; flex-shrink: 0; }
    .add-team-btn {
      margin-top: 0.4rem; background: transparent; border: 1px dashed #252525;
      color: #444; font-size: 12px; padding: 0.4rem 0.75rem; width: 100%;
      cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .add-team-btn:hover { border-color: var(--green); color: var(--green); }

    /* ── SCHEDULE ── */
    .sched-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .sched-meta {
      display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 0.75rem; margin-bottom: 1rem;
    }
    .sched-stat {
      background: var(--surface); border: 1px solid var(--border);
      padding: 0.85rem 1rem;
    }
    .sched-stat span {
      display: block; font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.25rem;
    }
    .sched-stat strong {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; letter-spacing: 0.08em;
      color: var(--white); font-weight: 400;
    }
    .sched-note {
      background: rgba(45,184,75,0.07); border: 1px solid rgba(45,184,75,0.3);
      color: var(--green); padding: 0.85rem 1rem; margin-bottom: 1rem;
      font-size: 12px; line-height: 1.5;
    }
    .sched-wrap { overflow-x: auto; }
    .sched-table { border-collapse: collapse; min-width: 500px; width: 100%; }
    .sched-table th {
      background: var(--green); color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.55rem 0.75rem; text-align: left; white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .sched-table th:first-child { background: #1a1a1a; color: var(--muted); width: 90px; }
    .sched-table td {
      border: 1px solid var(--border); padding: 0.4rem; vertical-align: top;
      background: var(--surface); min-width: 155px;
    }
    .sched-table td:first-child {
      background: #131313; font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); vertical-align: middle; min-width: 75px;
    }
    .sched-table td.empty-cell { background: #0c0c0c; }

    /* ── GAME CARD ── */
    .game-card { padding: 0.45rem 0.5rem; min-height: 88px; }
    .game-card.scored { background: rgba(45,184,75,0.05); }
    .gc-group { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--green); margin-bottom: 0.25rem; }
    .gc-teams { font-size: 12px; font-weight: 600; color: var(--white); line-height: 1.4; margin-bottom: 0.2rem; }
    .gc-teams .vs { color: var(--muted); font-weight: 400; margin: 0 0.2rem; }
    .gc-ref { font-size: 10px; color: #454545; margin-bottom: 0.45rem; }
    .gc-score { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
    .score-in {
      width: 36px; background: #0a0a0a; border: 1px solid var(--border2);
      color: var(--white); font-size: 13px; font-weight: 700; text-align: center;
      padding: 0.2rem; outline: none; transition: border-color 0.15s;
    }
    .score-in:focus { border-color: var(--green); }
    .score-sep { color: #444; font-size: 12px; }
    .score-ok { font-size: 10px; color: var(--green); }

    /* ── PLAYOFFS PREVIEW ── */
    .po-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .po-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.1em; color: var(--white); margin-bottom: 1rem; }
    .po-row {
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1.25rem; margin-bottom: 0.4rem;
    }
    .po-round { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em; color: var(--green); width: 130px; flex-shrink: 0; }
    .po-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .po-pill {
      background: #0d0d0d; border: 1px solid var(--border2);
      padding: 0.3rem 0.7rem; font-size: 12px; color: var(--muted);
    }
    .po-pill.seeded { color: var(--white); border-color: #333; }

    /* ── STANDINGS ── */
    .bs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
    .stg-block { margin-bottom: 1.5rem; }
    .stg-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em; color: var(--green); margin-bottom: 0.5rem; }
    .stg-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .stg-tbl th {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); padding: 0.45rem 0.5rem; text-align: left; border-bottom: 1px solid var(--border);
    }
    .stg-tbl td { padding: 0.5rem 0.5rem; border-bottom: 1px solid #181818; }
    .stg-tbl tr:nth-child(even) td { background: #131313; }
    .stg-tbl tr.adv td { background: rgba(45,184,75,0.07); }
    .stg-tbl tr.adv td:first-child { border-left: 2px solid var(--green); padding-left: calc(0.5rem - 2px); }
    .stg-rank { font-weight: 700; color: #555; }
    .diff-p { color: var(--green); }
    .diff-n { color: #e05555; }

    /* ── BRACKET VISUAL ── */
    .bracket-outer { overflow-x: auto; padding-bottom: 1rem; }
    .bracket-flex { display: flex; align-items: stretch; min-width: max-content; padding: 0.5rem 0; }
    .r-col { display: flex; flex-direction: column; }
    .r-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; letter-spacing: 0.12em; color: var(--green); text-align: center; padding: 0 1.25rem 0.75rem; white-space: nowrap; }
    .r-matches { display: flex; flex-direction: column; flex: 1; }
    .b-slot { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; }
    .b-card { width: 150px; border: 1px solid var(--border); background: var(--surface); position: relative; z-index: 1; }
    .b-team { padding: 0.5rem 0.7rem; font-size: 12px; font-weight: 500; color: var(--white); border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; white-space: nowrap; overflow: hidden; }
    .b-team:last-child { border-bottom: none; }
    .b-team.tbd { color: #3a3a3a; font-style: italic; }
    .b-team.win { color: var(--green); font-weight: 700; }
    .b-sc { font-size: 11px; font-weight: 700; color: var(--muted); flex-shrink: 0; margin-left: 4px; }
    .lines-col { width: 40px; position: relative; flex-shrink: 0; }
    .lines-col svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
    .champ-col { display: flex; flex-direction: column; }
    .champ-slot { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 1.25rem; }
    .champ-card { width: 150px; border: 1px solid var(--green); background: rgba(45,184,75,0.07); padding: 1rem; text-align: center; }
    .champ-ico { font-size: 1.5rem; margin-bottom: 0.35rem; }
    .champ-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--green); margin-bottom: 0.25rem; }
    .champ-nm { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.08em; color: var(--white); }

    /* ── NOTICE ── */
    .notice { padding: 2rem; border: 1px dashed var(--border2); color: var(--muted); font-size: 13px; text-align: center; }

    @media (max-width: 900px) {
      .setup-grid { grid-template-columns: 1fr; }
      .bs-grid { grid-template-columns: 1fr; }
      .sched-meta { grid-template-columns: 1fr 1fr; }
      .panel { padding: 1.5rem 1rem; }
      .admin-nav, .tab-nav { padding: 0 1rem; }
      .tab-btn { padding: 0.75rem 1rem; font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <nav class="admin-nav">
    <div class="nav-left">
      <img src="RHM-Logo.png" alt="RHM">
      <span class="nav-label">Tournament Manager</span>
    </div>
    <div class="nav-right">
      <a href="tournament-live.html" target="_blank">View Live Page</a>
      <a href="admin-dashboard.html">← Dashboard</a>
      <button class="btn-reset" onclick="resetTournament()">Reset</button>
      <a href="admin-login.html" data-admin-logout>Logout</a>
    </div>
  </nav>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="setup" onclick="switchTab('setup')">
      <span class="tab-step">Step 1</span>Setup
    </button>
    <button class="tab-btn" data-tab="schedule" onclick="switchTab('schedule')">
      <span class="tab-step">Step 2</span>Schedule
    </button>
    <button class="tab-btn" data-tab="bracket" onclick="switchTab('bracket')">
      <span class="tab-step">Step 3</span>Bracket &amp; Standings
    </button>
  </div>

  <!-- ───── TAB 1: SETUP ───── -->
  <div class="panel active" id="panel-setup">
    <div class="page-label">Step 1</div>
    <h1 class="page-headline">Tournament Setup</h1>
    <div class="setup-grid">

      <div>
        <div class="s-card">
          <div class="s-title">Tournament Settings</div>
          <div class="f-row">
            <label class="f-label" for="t-name">Tournament Name</label>
            <input class="f-input" id="t-name" type="text" placeholder="e.g. RHM Summer Classic">
          </div>
          <div class="f-row">
            <label class="f-label" for="t-sport">Sport</label>
            <select class="f-select" id="t-sport" onchange="onSportChange()">
              <option>Basketball</option>
              <option>3v3 Basketball</option>
              <option>Soccer</option>
              <option selected>Flag Football</option>
            </select>
          </div>
          <div class="f-row">
            <label class="f-label" for="t-setup-mode">Setup Mode</label>
            <select class="f-select" id="t-setup-mode" onchange="onSetupModeChange()">
              <option value="manual-groups">Create Groups</option>
              <option value="team-list">List All Teams</option>
            </select>
          </div>
          <div class="f-row" id="team-list-wrap" style="display:none;">
            <label class="f-label" for="t-team-list">Team List</label>
            <textarea class="f-input" id="t-team-list" rows="8" placeholder="One team per line"></textarea>
          </div>
          <div class="f-row" id="group-method-wrap" style="display:none;">
            <label class="f-label" for="t-group-method">Group Draw</label>
            <select class="f-select" id="t-group-method">
              <option value="seeded">Seeded snake</option>
              <option value="random">Random draw</option>
            </select>
          </div>
          <div class="f-grid-2">
            <div class="f-row">
              <label class="f-label" for="t-groups">Groups</label>
              <input class="f-input" id="t-groups" type="number" min="1" max="4" value="2" oninput="onGroupsChange()">
            </div>
            <div class="f-row">
              <label class="f-label" for="t-fields">Fields / Courts</label>
              <input class="f-input" id="t-fields" type="number" min="1" max="4" value="2" oninput="onFieldsChange()">
            </div>
          </div>
          <div class="f-grid-2">
            <div class="f-row">
              <label class="f-label" for="t-duration">Game Duration (min)</label>
              <input class="f-input" id="t-duration" type="number" min="5" max="120" value="25">
            </div>
            <div class="f-row">
              <label class="f-label" for="t-break">Break (min)</label>
              <input class="f-input" id="t-break" type="number" min="0" max="60" value="5">
            </div>
          </div>
          <div class="f-grid-2">
            <div class="f-row">
              <label class="f-label" for="t-start">Start Time</label>
              <input class="f-input" id="t-start" type="time" value="10:00">
            </div>
            <div class="f-row">
              <label class="f-label" for="t-playoff">Playoff Format</label>
              <select class="f-select" id="t-playoff">
                <option value="top1">Top 1 per group</option>
                <option value="top2" selected>Top 2 per group</option>
                <option value="top4">Top 4 per group</option>
              </select>
            </div>
          </div>
          <div class="f-grid-2">
            <div class="f-row">
              <label class="f-label" for="t-break-po">Break Before Playoffs (min)</label>
              <input class="f-input" id="t-break-po" type="number" min="0" max="180" value="30">
            </div>
            <div class="f-row">
              <label class="f-label" for="t-po-duration">Playoff Game Duration (min)</label>
              <input class="f-input" id="t-po-duration" type="number" min="5" max="120" value="25">
            </div>
          </div>
          <div class="f-grid-2">
            <div class="f-row">
              <label class="f-label" for="t-win-points">Win Points</label>
              <input class="f-input" id="t-win-points" type="number" min="0" max="20" value="3">
            </div>
            <div class="f-row">
              <label class="f-label" for="t-draw-points">Draw Points</label>
              <input class="f-input" id="t-draw-points" type="number" min="0" max="20" value="1">
            </div>
          </div>
          <div class="f-grid-2">
            <div class="f-row">
              <label class="f-label" for="t-loss-points">Loss Points</label>
              <input class="f-input" id="t-loss-points" type="number" min="0" max="20" value="0">
            </div>
            <div class="f-row">
              <label class="f-label" for="t-ties">Ties Allowed</label>
              <select class="f-select" id="t-ties">
                <option value="true">Yes</option>
                <option value="false" selected>No</option>
              </select>
            </div>
          </div>
          <div class="f-row" style="margin-bottom:0;">
            <label class="f-label">Venues</label>
            <div id="venue-controls"></div>
          </div>
        </div>
      </div>

      <div>
        <div class="s-card">
          <div class="s-title">Teams</div>
          <div id="groups-container"></div>
        </div>
      </div>
    </div>

    <div style="text-align:center;padding-top:0.5rem;">
      <button class="btn-primary" style="padding:0.9rem 3.5rem;font-size:1.2rem;" onclick="generateSchedule()">Generate Schedule</button>
    </div>
  </div>

  <!-- ───── TAB 2: SCHEDULE ───── -->
  <div class="panel" id="panel-schedule">
    <div class="sched-header">
      <div>
        <div class="page-label">Step 2</div>
        <h1 class="page-headline" id="sched-headline" style="margin-bottom:0;">Schedule</h1>
      </div>
      <div style="display:flex;gap:0.6rem;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
        <span id="publish-status" style="font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);">Draft</span>
        <button class="btn-primary" onclick="publishTournament()">Publish</button>
        <button class="btn-reset" onclick="unpublishTournament()">Unpublish</button>
        <button class="btn-primary" onclick="window.print()">Export PDF</button>
      </div>
    </div>
    <div class="sched-wrap">
      <div id="sched-grid"></div>
    </div>
    <div id="po-preview"></div>
  </div>

  <!-- ───── TAB 3: BRACKET & STANDINGS ───── -->
  <div class="panel" id="panel-bracket">
    <div class="page-label">Step 3</div>
    <h1 class="page-headline">Bracket &amp; Standings</h1>
    <div class="bs-grid">
      <div id="standings-area"></div>
      <div>
        <div class="s-title">Playoff Bracket</div>
        <div id="bracket-area" class="bracket-outer"></div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/admin-auth.js"></script>
<script src="assets/js/tournament-groups.js"></script>
<script src="assets/js/tournament-standings.js"></script>
<script src="assets/js/tournament-engine.js"></script>
<script src="assets/js/tournament-store.js"></script>
<script>
const GL = ['A','B','C','D'];
const ADV = { top1:1, top2:2, top4:4 };

let S = mkDefault();
let draggingFixtureId = null;

function mkDefault() {
  return {
    id: 'active',
    status: 'draft',
    activePublicTournament: false,
    settings: { name:'', sport:'Flag Football' },
    divisions: [{
      id: 'division-main',
      name: 'Main Division',
      sport: 'Flag Football',
      setupMode: 'manual-groups',
      schedulingMode: 'shared',
      settings: {
        numGroups: 2,
        numFields: 2,
        gameDuration: 25,
        breakBetween: 5,
        breakBeforePlayoffs: 30,
        playoffGameDuration: 25,
        startTime: '10:00',
        playoffFormat: 'top2',
        winPoints: 3,
        drawPoints: 1,
        lossPoints: 0,
        tiesAllowed: false
      },
      teamList: '',
      groups: [
        { id:'group-a', name:'Group A', teams:['','','',''] },
        { id:'group-b', name:'Group B', teams:['','','',''] }
      ],
      venues: [
        { id:'venue-1', name:'Field 1' },
        { id:'venue-2', name:'Field 2' }
      ],
      blockedWindows: [],
      fixtures: [],
      seedOverrides: []
    }]
  };
}

function activeDivision() {
  if (!S.divisions || !S.divisions.length) S = mkDefault();
  return S.divisions[0];
}

function migrateLoadedState(state) {
  if (!state || state.divisions) return state;
  const migrated = mkDefault();
  migrated.settings = { name: state.settings?.name || '', sport: state.settings?.sport || 'Flag Football' };
  migrated.status = state.status || 'draft';
  migrated.activePublicTournament = state.activePublicTournament || false;
  migrated.publishedAt = state.publishedAt;
  migrated.divisions[0].sport = migrated.settings.sport;
  migrated.divisions[0].settings = Object.assign({}, migrated.divisions[0].settings, state.settings || {});
  migrated.divisions[0].groups = (state.groups || migrated.divisions[0].groups).map((group, index) => ({
    id: group.id || 'group-' + GL[index].toLowerCase(),
    name: group.name || 'Group ' + GL[index],
    teams: group.teams || []
  }));
  migrated.divisions[0].venues = Array.from({ length: state.settings?.effectiveFields || state.settings?.numFields || 2 }, (_, index) => ({
    id: 'venue-' + (index + 1),
    name: (migrated.settings.sport || '').includes('Basketball') ? 'Court ' + (index + 1) : 'Field ' + (index + 1)
  }));
  migrated.divisions[0].fixtures = (state.schedule || []).map(g => ({
    id: g.id,
    divisionId: 'division-main',
    phase: 'group',
    groupId: 'group-' + GL[g.gi].toLowerCase(),
    groupName: g.gName,
    teamA: g.tA,
    teamB: g.tB,
    venueId: 'venue-' + (g.field + 1),
    venueName: migrated.divisions[0].venues[g.field]?.name || 'Field ' + (g.field + 1),
    slot: g.slot,
    startsAt: g.time,
    scoreA: g.scoreA,
    scoreB: g.scoreB,
    ref: g.ref || '',
    status: g.scoreA !== null && g.scoreA !== undefined && g.scoreB !== null && g.scoreB !== undefined ? 'final' : 'scheduled'
  }));
  return migrated;
}

function syncLegacyTournamentFields() {
  const div = activeDivision();
  const settings = div.settings || {};
  const groups = div.groups || [];
  const venues = div.venues || [];
  const advance = ADV[settings.playoffFormat] || 2;

  S.settings = Object.assign({}, settings, {
    name: S.settings?.name || '',
    sport: S.settings?.sport || div.sport || 'Flag Football',
    effectiveFields: venues.length || settings.numFields || 2
  });
  S.groups = groups;
  S.schedule = (div.fixtures || []).filter(fixture => fixture.phase === 'group').map(fixture => {
    const venueIndex = Number.isFinite(Number(fixture.venueIndex))
      ? Number(fixture.venueIndex)
      : Math.max(0, venues.findIndex(venue => venue.id === fixture.venueId));
    const groupIndex = Math.max(0, groups.findIndex(group => group.id === fixture.groupId));

    return {
      id: fixture.id,
      gi: groupIndex,
      gName: fixture.groupName || groups[groupIndex]?.name || 'Group ' + GL[groupIndex],
      tA: fixture.teamA || fixture.seedA?.label || 'TBD',
      tB: fixture.teamB || fixture.seedB?.label || 'TBD',
      field: venueIndex,
      slot: fixture.slot,
      time: fixture.startsAt,
      scoreA: fixture.scoreA ?? null,
      scoreB: fixture.scoreB ?? null,
      ref: fixture.ref || ''
    };
  });
  S.playoffs = window.RHMTournamentEngine.buildPlayoffs(groups.length * advance);
}

function save() {
  syncLegacyTournamentFields();
  window.RHMTournamentStore.saveTournamentState(S).catch(error => console.error(error));
}
async function tryLoad() {
  try {
    const d = await window.RHMTournamentStore.loadTournamentState();
    if (d) {
      S = migrateLoadedState(d);
      syncLegacyTournamentFields();
    }
  } catch(e) {
    console.error(e);
  }
}

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  if (tab === 'schedule') renderSchedule();
  if (tab === 'bracket') renderBracketTab();
}

// ── SETTINGS ──
function readSettings() {
  const div = activeDivision();
  const sport = document.getElementById('t-sport').value;
  const divisionSettings = {
    numGroups: Math.max(1, Math.min(4, parseInt(document.getElementById('t-groups').value) || 2)),
    numFields: Math.max(1, Math.min(4, parseInt(document.getElementById('t-fields').value) || 2)),
    gameDuration: parseInt(document.getElementById('t-duration').value) || 25,
    breakBetween: parseInt(document.getElementById('t-break').value) || 5,
    breakBeforePlayoffs: parseInt(document.getElementById('t-break-po').value) || 0,
    playoffGameDuration: parseInt(document.getElementById('t-po-duration').value) || 25,
    startTime: document.getElementById('t-start').value || '10:00',
    playoffFormat: document.getElementById('t-playoff').value,
    winPoints: parseInt(document.getElementById('t-win-points').value) || 0,
    drawPoints: parseInt(document.getElementById('t-draw-points').value) || 0,
    lossPoints: parseInt(document.getElementById('t-loss-points').value) || 0,
    tiesAllowed: document.getElementById('t-ties').value === 'true'
  };
  S.settings = {
    name: document.getElementById('t-name').value.trim(),
    sport: sport
  };
  div.sport = sport;
  div.setupMode = document.getElementById('t-setup-mode').value;
  div.teamList = document.getElementById('t-team-list').value;
  div.settings = Object.assign({}, div.settings, divisionSettings);
  syncVenueCount(divisionSettings.numFields);
  return div.settings;
}

function applySettings(cfg) {
  const div = activeDivision();
  const global = cfg || S.settings || {};
  const settings = div.settings || {};
  document.getElementById('t-name').value = global.name || '';
  document.getElementById('t-sport').value = global.sport || div.sport || 'Flag Football';
  document.getElementById('t-setup-mode').value = div.setupMode || 'manual-groups';
  document.getElementById('t-team-list').value = div.teamList || '';
  document.getElementById('t-groups').value = settings.numGroups || 2;
  document.getElementById('t-fields').value = settings.numFields || 2;
  document.getElementById('t-duration').value = settings.gameDuration || 25;
  document.getElementById('t-break').value = settings.breakBetween || 5;
  document.getElementById('t-break-po').value = settings.breakBeforePlayoffs ?? 30;
  document.getElementById('t-po-duration').value = settings.playoffGameDuration || 25;
  document.getElementById('t-start').value = settings.startTime || '10:00';
  document.getElementById('t-playoff').value = settings.playoffFormat || 'top2';
  document.getElementById('t-win-points').value = settings.winPoints ?? 3;
  document.getElementById('t-draw-points').value = settings.drawPoints ?? 1;
  document.getElementById('t-loss-points').value = settings.lossPoints ?? 0;
  document.getElementById('t-ties').value = settings.tiesAllowed === true ? 'true' : 'false';
  syncVenueCount(settings.numFields || 2);
  renderSetupMode();
  renderVenues();
}

function onGroupsChange() {
  const n = Math.max(1, Math.min(4, parseInt(document.getElementById('t-groups').value) || 2));
  const div = activeDivision();
  div.settings.numGroups = n;
  while (div.groups.length < n) div.groups.push({ id:'group-' + GL[div.groups.length].toLowerCase(), name:'Group ' + GL[div.groups.length], teams:['','','',''] });
  if (div.groups.length > n) div.groups = div.groups.slice(0, n);
  renderGroups();
}

function onFieldsChange() {
  const count = Math.max(1, Math.min(4, parseInt(document.getElementById('t-fields').value) || 2));
  activeDivision().settings.numFields = count;
  syncVenueCount(count);
  renderVenues();
}

function onSportChange() {
  const div = activeDivision();
  const previousSport = div.sport || S.settings.sport || 'Flag Football';
  S.settings.sport = document.getElementById('t-sport').value;
  div.sport = S.settings.sport;
  syncVenueCount(div.settings.numFields || 2, previousSport);
  renderVenues();
}

function onSetupModeChange() {
  const div = activeDivision();
  div.setupMode = document.getElementById('t-setup-mode').value;
  renderSetupMode();
  renderGroups();
}

function renderSetupMode() {
  const mode = document.getElementById('t-setup-mode').value;
  document.getElementById('team-list-wrap').style.display = mode === 'team-list' ? '' : 'none';
  document.getElementById('group-method-wrap').style.display = mode === 'team-list' ? '' : 'none';
}

function venueDefaultName(sport, index) {
  return (String(sport || '').includes('Basketball') ? 'Court ' : 'Field ') + (index + 1);
}

function syncVenueCount(count, previousSport) {
  const div = activeDivision();
  const total = Math.max(1, Math.min(4, parseInt(count) || 2));
  div.venues = Array.isArray(div.venues) ? div.venues : [];
  while (div.venues.length < total) {
    const index = div.venues.length;
    div.venues.push({ id:'venue-' + (index + 1), name: venueDefaultName(div.sport || S.settings.sport, index) });
  }
  if (div.venues.length > total) div.venues = div.venues.slice(0, total);
  div.venues.forEach((venue, index) => {
    venue.id = venue.id || 'venue-' + (index + 1);
    const oldDefault = previousSport ? venueDefaultName(previousSport, index) : '';
    if (!venue.name || venue.name === oldDefault || /^(Field|Court) \d+$/.test(venue.name)) {
      venue.name = venueDefaultName(div.sport || S.settings.sport, index);
    }
  });
}

function renderVenues() {
  const div = activeDivision();
  const c = document.getElementById('venue-controls');
  if (!c) return;
  c.innerHTML = div.venues.map((venue, index) => `
    <div class="group-team-row">
      <span class="team-num">${index + 1}</span>
      <input class="f-input" type="text" value="${ea(venue.name)}" placeholder="${ea(venueDefaultName(div.sport || S.settings.sport, index))}" oninput="setVenue(${index}, this.value)">
    </div>
  `).join('');
}

function setVenue(index, value) {
  const div = activeDivision();
  if (!div.venues[index]) div.venues[index] = { id:'venue-' + (index + 1), name:'' };
  div.venues[index].name = value;
}

// ── GROUP INPUTS ──
function renderGroups() {
  const c = document.getElementById('groups-container');
  c.innerHTML = '';
  const div = activeDivision();
  if ((div.setupMode || 'manual-groups') === 'team-list') {
    c.innerHTML = '<div class="notice">Teams will be drawn into groups from the team list when you generate the schedule.</div>';
    return;
  }
  ensureGroupInputs();
  div.groups.forEach((grp, gi) => {
    const d = document.createElement('div');
    d.className = 'group-block';
    const filled = grp.teams.filter(t => t.trim()).length;
    d.innerHTML = `
      <div class="group-head">
        <span class="group-name-tag">Group ${GL[gi]}</span>
        <span style="font-size:11px;color:var(--muted)">${filled} team${filled!==1?'s':''}</span>
      </div>
      <div id="gteams-${gi}">
        ${grp.teams.map((t,ti) => `
          <div class="group-team-row">
            <span class="team-num">${ti+1}</span>
            <input class="f-input" type="text" placeholder="Team ${ti+1}" value="${ea(t)}"
              oninput="setTeam(${gi},${ti},this.value)">
            ${grp.teams.length > 2 ? `<button class="btn-sm-danger" onclick="removeTeam(${gi},${ti})">✕</button>` : ''}
          </div>
        `).join('')}
      </div>
      <button class="add-team-btn" onclick="addTeam(${gi})">+ Add Team</button>
    `;
    c.appendChild(d);
  });
}

function setTeam(gi, ti, val) {
  const div = activeDivision();
  div.groups[gi].teams[ti] = val;
  const head = document.querySelector(`#gteams-${gi}`).closest('.group-block').querySelector('.group-head span:last-child');
  if (head) { const f = div.groups[gi].teams.filter(t=>t.trim()).length; head.textContent = f + ' team' + (f!==1?'s':''); }
}

function addTeam(gi) { activeDivision().groups[gi].teams.push(''); renderGroups(); }
function removeTeam(gi, ti) { const groups = activeDivision().groups; if (groups[gi].teams.length > 2) { groups[gi].teams.splice(ti,1); renderGroups(); } }

function ensureGroupInputs() {
  const div = activeDivision();
  const n = div.settings.numGroups || 2;
  while (div.groups.length < n) div.groups.push({ id:'group-' + GL[div.groups.length].toLowerCase(), name:'Group ' + GL[div.groups.length], teams:['','','',''] });
  div.groups = div.groups.slice(0, n);
  div.groups.forEach((group, index) => {
    group.id = 'group-' + GL[index].toLowerCase();
    group.name = group.name || 'Group ' + GL[index];
    group.teams = Array.isArray(group.teams) ? group.teams : [];
    while (group.teams.length < 4) group.teams.push('');
  });
}

function competitionGroups() {
  const div = activeDivision();
  return (div.groups || []).slice(0, div.settings.numGroups || 2).map((group, index) => ({
    id: 'group-' + GL[index].toLowerCase(),
    name: group.name || 'Group ' + GL[index],
    teams: window.RHMTournamentGroups.parseTeamList(group.teams || [])
  }));
}

function groupsForUi(groups) {
  return (groups || []).map((group, index) => {
    const teams = (group.teams || []).slice();
    while (teams.length < 4) teams.push('');
    return {
      id: group.id || 'group-' + GL[index].toLowerCase(),
      name: group.name || 'Group ' + GL[index],
      teams: teams
    };
  });
}

// ── SCHEDULE GENERATION ──
function generateSchedule() {
  const div = activeDivision();
  readSettings();

  let groups = competitionGroups();
  if (div.setupMode === 'team-list') {
    groups = window.RHMTournamentGroups.buildGroupsFromTeamList({
      teams: div.teamList,
      numGroups: div.settings.numGroups,
      method: document.getElementById('t-group-method').value
    });
  }

  const result = window.RHMTournamentEngine.generateDivisionSchedule({
    divisionId: div.id,
    settings: div.settings,
    groups: groups,
    venues: div.venues,
    blockedWindows: div.blockedWindows || []
  });
  div.settings = Object.assign({}, div.settings, result.settings);
  div.groups = groupsForUi(result.groups);
  div.venues = result.venues;
  div.fixtures = result.fixtures.map(fixture => Object.assign({ status:'scheduled' }, fixture));
  div.scheduleSummary = result.summary;
  syncLegacyTournamentFields();

  save();
  switchTab('schedule');
}

// ── SCHEDULE RENDER ──
function renderSchedule() {
  const div = activeDivision();
  const fixtures = div.fixtures || [];
  if (!fixtures.length) {
    document.getElementById('sched-grid').innerHTML = '<div class="notice">No schedule yet - complete Setup and click Generate Schedule.</div>';
    document.getElementById('po-preview').innerHTML = '';
    renderPublishStatus();
    return;
  }
  document.getElementById('sched-headline').textContent = S.settings.name || 'Schedule';

  const slots = [...new Set(fixtures.map(g => g.slot))].sort((a,b)=>a-b);
  const timeOf = {};
  fixtures.forEach(g => { timeOf[g.slot] = g.startsAt; });
  const venues = (div.venues && div.venues.length) ? div.venues : [];
  const summary = div.scheduleSummary || {
    totalFixtures: fixtures.length,
    totalSlots: slots.length,
    gameBlockMinutes: (parseInt(div.settings.gameDuration) || 25) + (parseInt(div.settings.breakBetween) || 0),
    note: ''
  };
  const seeds = projectedSeeds();

  let html = `
    <div class="sched-meta">
      <div class="sched-stat"><span>Fixtures</span><strong>${summary.totalFixtures || fixtures.length}</strong></div>
      <div class="sched-stat"><span>Time Slots</span><strong>${summary.totalSlots}</strong></div>
      <div class="sched-stat"><span>Venues</span><strong>${venues.length}</strong></div>
      <div class="sched-stat"><span>Block</span><strong>${summary.gameBlockMinutes} min</strong></div>
    </div>
    ${summary.note ? `<div class="sched-note">${eh(summary.note)}</div>` : ''}
    <table class="sched-table"><thead><tr><th>Venue</th>`;
  slots.forEach(s => { html += `<th>${timeOf[s]}</th>`; });
  html += '</tr></thead><tbody>';

  venues.forEach(venue => {
    html += `<tr><td>${eh(venue.name)}</td>`;
    slots.forEach(s => {
      const g = fixtures.find(x => x.venueId === venue.id && x.slot === s);
      if (!g) {
        html += `<td class="empty-cell" ondragover="onFixtureDragOver(event)" ondrop="onFixtureDrop(event,'${ea(venue.id)}',${s})"></td>`;
        return;
      }
      const scored = isScored(g);
      html += `
        <td ondragover="onFixtureDragOver(event)" ondrop="onFixtureDrop(event,'${ea(venue.id)}',${s})">
          <div class="game-card${scored?' scored':''}" id="gc-${g.id}" draggable="true" ondragstart="onFixtureDragStart(event,'${ea(g.id)}')">
            <div class="gc-group">${eh(fixturePhaseLabel(g))}</div>
            <div class="gc-teams">${eh(fixtureTeamLabel(g, 'A', seeds))}<span class="vs">vs</span>${eh(fixtureTeamLabel(g, 'B', seeds))}</div>
            <div class="gc-ref">${g.phase === 'group' ? 'Ref: ' + eh(g.ref || '-') : eh(g.roundName || 'Playoff')}</div>
            <div class="gc-score">
              <input class="score-in" id="sa-${g.id}" type="number" min="0" value="${g.scoreA !== null ? g.scoreA : ''}" placeholder="0">
              <span class="score-sep">-</span>
              <input class="score-in" id="sb-${g.id}" type="number" min="0" value="${g.scoreB !== null ? g.scoreB : ''}" placeholder="0">
              <button class="btn-score" onclick="saveScore('${g.id}')">Save</button>
              ${scored ? '<span class="score-ok">Saved</span>' : ''}
            </div>
          </div>
        </td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('sched-grid').innerHTML = html;

  renderPoPreview();
  renderPublishStatus();
}

function renderPoPreview() {
  const div = activeDivision();
  const playoffs = (div.fixtures || []).filter(fixture => fixture.phase === 'playoff');
  if (!playoffs.length) { document.getElementById('po-preview').innerHTML = ''; return; }
  const byRound = {};
  const seeds = projectedSeeds();
  playoffs.forEach(m => { (byRound[m.roundIndex] = byRound[m.roundIndex] || { name:m.roundName, ms:[] }).ms.push(m); });

  let html = '<div class="po-section"><div class="po-title">Playoffs</div>';
  Object.values(byRound).forEach(r => {
    html += `<div class="po-row"><div class="po-round">${r.name}</div><div class="po-pills">`;
    r.ms.forEach(m => {
      const a = fixtureTeamLabel(m, 'A', seeds);
      const b = fixtureTeamLabel(m, 'B', seeds);
      html += `<div class="po-pill seeded">${eh(a)} vs ${eh(b)}</div>`;
    });
    html += '</div></div>';
  });
  html += '</div>';
  document.getElementById('po-preview').innerHTML = html;
}

function saveScore(id) {
  const div = activeDivision();
  const g = (div.fixtures || []).find(x => x.id === id);
  if (!g) return;
  const a = parseInt(document.getElementById('sa-'+id).value);
  const b = parseInt(document.getElementById('sb-'+id).value);
  if (isNaN(a) || isNaN(b)) return;
  g.scoreA = a;
  g.scoreB = b;
  g.status = 'final';
  g.winner = a > b ? fixtureTeamLabel(g, 'A', projectedSeeds()) : b > a ? fixtureTeamLabel(g, 'B', projectedSeeds()) : null;
  save();
  const card = document.getElementById('gc-'+id);
  if (card) {
    card.classList.add('scored');
    if (!card.querySelector('.score-ok')) {
      card.querySelector('.btn-score').insertAdjacentHTML('afterend', '<span class="score-ok">Saved</span>');
    }
  }
  renderSchedule();
  if (document.getElementById('panel-bracket').classList.contains('active')) renderBracketTab();
}

// ── STANDINGS ──
function computeStandings() {
  const div = activeDivision();
  return window.RHMTournamentStandings.computeStandings({
    groups: competitionGroups(),
    fixtures: div.fixtures || [],
    rules: div.settings || {}
  });
}

function projectedSeeds(standings) {
  const div = activeDivision();
  const advance = ADV[(div.settings || {}).playoffFormat] || 2;
  return window.RHMTournamentStandings.projectSeeds({
    standings: standings || computeStandings(),
    seedOverrides: div.seedOverrides || [],
    advancePerGroup: advance
  });
}

// ── BRACKET & STANDINGS TAB ──
function renderBracketTab() {
  const div = activeDivision();
  const standings = computeStandings();
  const advance = ADV[div.settings.playoffFormat] || 2;

  // Standings tables
  let html = '';
  standings.forEach(gs => {
    html += `<div class="stg-block">
      <div class="stg-name">${eh(gs.groupName)}</div>
      <table class="stg-tbl">
        <thead><tr><th>#</th><th>Team</th><th>Pts</th><th>W</th><th>D</th><th>L</th><th>PF</th><th>PA</th><th>+/-</th></tr></thead>
        <tbody>
          ${gs.rows.map((r,ri) => `
            <tr class="${ri<advance?'adv':''}">
              <td><span class="stg-rank">${r.rank || ri+1}</span></td>
              <td>${eh(r.team)}</td>
              <td>${r.points}</td><td>${r.wins}</td><td>${r.draws}</td><td>${r.losses}</td><td>${r.pf}</td><td>${r.pa}</td>
              <td class="${r.diff>0?'diff-p':r.diff<0?'diff-n':''}">${r.diff>0?'+':''}${r.diff}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  });
  document.getElementById('standings-area').innerHTML = html || '<div class="notice">Complete setup to see standings.</div>';

  renderBracket(projectedSeeds(standings));
}

function renderBracket(seeds) {
  const div = activeDivision();
  const container = document.getElementById('bracket-area');
  const playoffs = (div.fixtures || []).filter(fixture => fixture.phase === 'playoff');
  if (!seeds.length || !playoffs.length) {
    container.innerHTML = '<div class="notice">Generate a schedule to see the bracket.</div>';
    return;
  }

  const byRound = {};
  playoffs.forEach(fixture => { (byRound[fixture.roundIndex] = byRound[fixture.roundIndex] || []).push(fixture); });
  const rounds = Object.keys(byRound).map(Number).sort((a,b)=>a-b).map(index => byRound[index]);
  const totalSlots = Math.max.apply(null, rounds.map(round => round.length));

  const wrap = document.createElement('div');
  wrap.className = 'bracket-flex';

  rounds.forEach((matches, ri) => {
    const col = document.createElement('div');
    col.className = 'r-col';
    col.innerHTML = `<div class="r-label">${eh(matches[0]?.roundName || 'Round ' + (ri + 1))}</div>`;
    const mc = document.createElement('div');
    mc.className = 'r-matches';
    const flex = totalSlots / matches.length;
    matches.forEach(m => {
      const slot = document.createElement('div');
      slot.className = 'b-slot';
      slot.style.flex = flex;
      const card = document.createElement('div');
      card.className = 'b-card';
      ['A','B'].forEach(side => {
        const team = fixtureTeamLabel(m, side, seeds);
        const row = document.createElement('div');
        const tbd = !team || team === 'TBD';
        const winner = m.winner && m.winner === team;
        row.className = 'b-team' + (tbd ? ' tbd' : '');
        if (winner) row.className += ' win';
        const span = document.createElement('span');
        span.textContent = team || 'TBD';
        row.appendChild(span);
        if (isScored(m)) {
          const score = document.createElement('span');
          score.className = 'b-sc';
          score.textContent = side === 'A' ? m.scoreA : m.scoreB;
          row.appendChild(score);
        }
        card.appendChild(row);
      });
      slot.appendChild(card);
      mc.appendChild(slot);
    });
    col.appendChild(mc);
    wrap.appendChild(col);

    if (ri < rounds.length - 1) {
      const lc = document.createElement('div');
      lc.className = 'lines-col';
      lc.dataset.ri = ri;
      lc.innerHTML = '<svg></svg>';
      wrap.appendChild(lc);
    }
  });

  // Champion
  const cc = document.createElement('div');
  cc.className = 'champ-col';
  cc.innerHTML = `<div class="r-label">Champion</div>`;
  const cs = document.createElement('div');
  cs.className = 'champ-slot';
  cs.style.flex = totalSlots;
  const finalFixture = playoffs.slice().sort((a,b)=>(b.roundIndex||0)-(a.roundIndex||0))[0];
  cs.innerHTML = `<div class="champ-card"><div class="champ-lbl">Winner</div><div class="champ-nm">${eh(finalFixture?.winner || 'TBD')}</div></div>`;
  cc.appendChild(cs);
  wrap.appendChild(cc);

  container.innerHTML = '';
  container.appendChild(wrap);

  // Draw SVG connectors after layout
  requestAnimationFrame(() => {
    wrap.querySelectorAll('.lines-col').forEach(lc => {
      const ri = parseInt(lc.dataset.ri);
      const cols = wrap.querySelectorAll('.r-col');
      const fromCds = Array.from(cols[ri].querySelectorAll('.b-card'));
      const toCds = Array.from(cols[ri+1].querySelectorAll('.b-card'));
      const svg = lc.querySelector('svg');
      const lr = lc.getBoundingClientRect();
      const mx = lr.width / 2;
      const lines = [];
      toCds.forEach((tc, i) => {
        const a = fromCds[i*2];
        const b = fromCds[i*2+1];
        const cr = tc.getBoundingClientRect();
        const cy = cr.top + cr.height/2 - lr.top;
        const cx = cr.left - lr.left;
        if (a) {
          const ar = a.getBoundingClientRect();
          const ay = ar.top + ar.height/2 - lr.top;
          const ax = ar.right - lr.left;
          if (b) {
            const br = b.getBoundingClientRect();
            const by = br.top + br.height/2 - lr.top;
            lines.push(`
              <line x1="${ax}" y1="${ay}" x2="${mx}" y2="${ay}" stroke="#2a2a2a" stroke-width="1"/>
              <line x1="${br.right - lr.left}" y1="${by}" x2="${mx}" y2="${by}" stroke="#2a2a2a" stroke-width="1"/>
              <line x1="${mx}" y1="${ay}" x2="${mx}" y2="${by}" stroke="#2a2a2a" stroke-width="1"/>
              <line x1="${mx}" y1="${(ay+by)/2}" x2="${cx}" y2="${cy}" stroke="#2a2a2a" stroke-width="1"/>
            `);
          } else {
            lines.push(`<line x1="${ax}" y1="${ay}" x2="${cx}" y2="${cy}" stroke="#2a2a2a" stroke-width="1"/>`);
          }
        }
      });
      svg.innerHTML = lines.join('');
    });
  });
}

function isScored(fixture) {
  return fixture && fixture.scoreA !== null && fixture.scoreA !== '' && fixture.scoreB !== null && fixture.scoreB !== '';
}

function fixturePhaseLabel(fixture) {
  if (fixture.phase === 'playoff') return fixture.roundName || 'Playoff';
  return fixture.groupName || 'Group';
}

function resolveSeedSide(side, seeds) {
  if (!side) return 'TBD';
  if (side.sourceFixtureId) {
    const source = (activeDivision().fixtures || []).find(fixture => fixture.id === side.sourceFixtureId);
    return source?.winner || side.label || 'TBD';
  }
  const seed = (seeds || []).find(item => item.groupId === side.groupId && item.seed === side.seed);
  return seed?.team || side.label || 'TBD';
}

function fixtureTeamLabel(fixture, side, seeds) {
  if (!fixture) return 'TBD';
  const key = side === 'A' ? 'teamA' : 'teamB';
  const seedKey = side === 'A' ? 'seedA' : 'seedB';
  return fixture[key] || resolveSeedSide(fixture[seedKey], seeds);
}

function onFixtureDragStart(event, fixtureId) {
  draggingFixtureId = fixtureId;
  event.dataTransfer.setData('text/plain', fixtureId);
}

function onFixtureDragOver(event) {
  event.preventDefault();
}

function onFixtureDrop(event, venueId, slot) {
  event.preventDefault();
  const div = activeDivision();
  const fixtureId = event.dataTransfer.getData('text/plain') || draggingFixtureId;
  const playoffOrder = validatePlayoffDropOrder(fixtureId, slot);
  if (!playoffOrder.ok) { alert(playoffOrder.reason); return; }
  const result = window.RHMTournamentEngine.moveFixture({
    fixtureId,
    fixtures: div.fixtures,
    targetVenueId: venueId,
    targetSlot: slot,
    blockedWindows: div.blockedWindows,
    venues: div.venues,
    settings: div.settings
  });
  if (!result.ok) { alert(result.reason); return; }
  const targetVenueIndex = div.venues.findIndex(venue => venue.id === venueId);
  div.fixtures = result.fixtures.map(fixture => fixture.id === fixtureId
    ? Object.assign({}, fixture, { venueIndex: Math.max(0, targetVenueIndex) })
    : fixture);
  save();
  renderSchedule();
}

function playoffSourceIds(fixture) {
  return ['seedA','seedB'].map(key => fixture?.[key]?.sourceFixtureId).filter(Boolean);
}

function validatePlayoffDropOrder(fixtureId, targetSlot) {
  const div = activeDivision();
  const fixtures = div.fixtures || [];
  const moving = fixtures.find(fixture => fixture.id === fixtureId);
  if (!moving || moving.phase !== 'playoff') return { ok: true };

  const sourceIds = playoffSourceIds(moving);
  const sourceConflict = fixtures.find(fixture => sourceIds.includes(fixture.id) && targetSlot <= fixture.slot);
  if (sourceConflict) {
    return { ok: false, reason: 'Playoff game cannot be scheduled before the game that feeds into it.' };
  }

  const dependentConflict = fixtures.find(fixture => {
    if (fixture.phase !== 'playoff' || fixture.id === moving.id) return false;
    return playoffSourceIds(fixture).includes(moving.id) && targetSlot >= fixture.slot;
  });
  if (dependentConflict) {
    return { ok: false, reason: 'Earlier playoff game cannot be scheduled after a later game that depends on it.' };
  }

  return { ok: true };
}

async function publishTournament() {
  syncLegacyTournamentFields();
  S = await window.RHMTournamentStore.publishTournamentState(S);
  renderPublishStatus();
}

async function unpublishTournament() {
  syncLegacyTournamentFields();
  S = await window.RHMTournamentStore.unpublishTournamentState(S);
  renderPublishStatus();
}

function renderPublishStatus() {
  const node = document.getElementById('publish-status');
  if (node) node.textContent = S.status === 'published' ? 'Published' : 'Draft';
}

// ── RESET ──
async function resetTournament() {
  if (!confirm('Reset everything? All scores, teams, and the schedule will be cleared.')) return;
  await window.RHMTournamentStore.clearTournamentState();
  S = mkDefault();
  applySettings(S.settings);
  renderGroups();
  renderPublishStatus();
  switchTab('setup');
}

// ── UTILS ──
function eh(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ea(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INIT ──
async function initTournamentAdmin() {
  window.RHMAdminAuth.wireLogoutLinks();
  const admin = await window.RHMAdminAuth.requireAdmin();
  if (!admin) return;
  await tryLoad();
  applySettings(S.settings);
  renderGroups();
  renderPublishStatus();
}

initTournamentAdmin().catch(error => console.error(error));
</script>
